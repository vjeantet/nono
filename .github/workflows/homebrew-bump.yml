name: Bump Homebrew Formula

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to bump to (e.g., v0.55.0)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  bump:
    name: Bump Homebrew Core Formula
    runs-on: ubuntu-latest
    steps:
      - name: Bump homebrew-core formula
        # Pinned to AvesAlight fork (v4.1.1) which accepts any 3xx redirect; revert to mislav once
        # https://github.com/mislav/bump-homebrew-formula-action/issues/340 is fixed upstream.
        uses: AvesAlight/bump-homebrew-formula-action@efacc598ed9b4b1bc526125f82d2dfba17509842 # v4.1.1
        with:
          formula-name: nono
          tag-name: ${{ github.event.inputs.tag }}
          download-url: "https://github.com/always-further/nono/archive/refs/tags/${{ github.event.inputs.tag }}.tar.gz"
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_CORE_TOKEN }}
