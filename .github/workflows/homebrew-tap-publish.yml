name: Homebrew Tap Publish

on:
  workflow_run:
    workflows: ["Release"]
    types:
      - completed
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to publish to the tap (e.g., v0.65.1)'
        required: true
        type: string

permissions:
  contents: read

# Serialize publishes so two close releases cannot race the tap repository.
concurrency:
  group: homebrew-tap-publish
  cancel-in-progress: false

jobs:
  resolve:
    name: Resolve publish parameters
    runs-on: ubuntu-latest
    if: >-
      github.repository == 'vjeantet/nono' &&
      ((github.event_name == 'workflow_dispatch') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'))
    outputs:
      tag: ${{ steps.params.outputs.tag }}
      publish: ${{ steps.params.outputs.publish }}
    steps:
      - name: Compute parameters
        id: params
        env:
          EVENT_NAME: ${{ github.event_name }}
          WR_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WD_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "workflow_run" ]; then
            TAG="$WR_HEAD_BRANCH"
          else
            TAG="$WD_TAG"
          fi

          # Only stable vX.Y.Z release tags are published to the tap. This
          # rejects prereleases (alpha/beta/rc) and workflow_run events for
          # Release runs started from a branch, where head_branch is the
          # branch name instead of a tag.
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Not a stable release tag: '$TAG' — skipping tap publish."
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "publish=true" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish to Homebrew tap
    needs: resolve
    if: ${{ needs.resolve.outputs.publish == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # The update script and formula template are always taken from the branch
      # the workflow runs on (the default branch), not from the release tag:
      # packaging fixes must flow into the next publish.
      - name: Checkout fork (packaging scripts)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Checkout tap repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: vjeantet/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Download release checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          gh release download "$RELEASE_TAG" \
            --repo vjeantet/nono \
            --pattern 'SHA256SUMS.txt' \
            --output SHA256SUMS.txt

      - name: Generate formula
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
          SHA256SUMS_FILE: SHA256SUMS.txt
          FORMULA_PATH: tap/Formula/nono.rb
        run: ./packaging/homebrew/update.sh "$RELEASE_TAG"

      - name: Commit and push to tap if changed
        env:
          RELEASE_TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          cd tap
          if [ -z "$(git status --porcelain)" ]; then
            echo "Tap already up to date with ${RELEASE_TAG}; nothing to push."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/nono.rb
          git commit -m "nono ${RELEASE_TAG#v}"
          git push
